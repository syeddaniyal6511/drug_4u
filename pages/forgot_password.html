<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(255,255,255,0.28);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #4f8ef7;
      --accent-hover: #3a78e8;
      --error-bg: rgba(220,53,69,0.12);
      --error-border: rgba(220,53,69,0.4);
      --error-text: #f87171;
      --success-bg: rgba(52,211,153,0.1);
      --success-border: rgba(52,211,153,0.35);
      --success-text: #34d399;
      --radius: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 80% 90%, rgba(79,142,247,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

    h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--border-focus); background: rgba(255,255,255,0.06); }
    input.has-error { border-color: var(--error-border); }

    .alert {
      display: none;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }
    .alert.visible { display: flex; }
    .alert.error   { background: var(--error-bg);   border: 0.5px solid var(--error-border);   color: var(--error-text); }
    .alert.success { background: var(--success-bg); border: 0.5px solid var(--success-border); color: var(--success-text); }

    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) { background: var(--accent-hover); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>

  <h1>Forgot password</h1>
  <p class="subtitle">Enter your email or email and we'll send you a reset link.</p>

  <!-- Error alert -->
  <div class="alert error" id="error-msg" role="alert">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="error-text"></span>
  </div>

  <!-- Success alert -->
  <div class="alert success" id="success-msg" role="status">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="success-text"></span>
  </div>

  <div class="field" id="input-field">
    <label for="identifier">Username or email</label>
    <input type="text" id="identifier" placeholder="pharmacy1 or you@example.com" autocomplete="email" />
  </div>

  <button class="btn" id="submit-btn" onclick="handleReset()">
    <span class="btn-text">Send reset link</span>
    <div class="spinner"></div>
  </button>

  <a href="login.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to sign in
  </a>
</div>

<script>
  function showError(msg) {
    document.getElementById('success-msg').classList.remove('visible');
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').classList.add('visible');
    document.getElementById('identifier').classList.add('has-error');
  }

  function showSuccess(msg) {
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('success-text').textContent = msg;
    document.getElementById('success-msg').classList.add('visible');
    // Hide the input once sent — prevents re-submission confusion
    document.getElementById('input-field').style.display = 'none';
    document.getElementById('submit-btn').style.display  = 'none';
  }

  function clearMessages() {
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('success-msg').classList.remove('visible');
    document.getElementById('identifier').classList.remove('has-error');
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function handleReset() {
    clearMessages();

    const identifier = document.getElementById('identifier').value.trim();
    if (!identifier) {
      showError('Please enter your email or email.');
      return;
    }

    setLoading(true);

    try {
      const response = await fetch('/drug_4u/controllers/forgot_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifier })
      });

      const text = await response.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (e) {
        console.error('PHP returned non-JSON:', text);
        showError('Server error. Please contact your administrator.');
        setLoading(false);
        return;
      }

      if (data.success) {
        showSuccess(data.message);
      } else {
        showError(data.message || 'Something went wrong. Please try again.');
      }

    } catch (error) {
      console.error('Fetch error:', error);
      showError('Cannot reach server. Please try again later.');
    }

    setLoading(false);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleReset();
  });
</script>
</body>
</html>
