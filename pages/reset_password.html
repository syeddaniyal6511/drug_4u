<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #d9d4ff;
      --surface: #ffffff;
      --border: rgba(15,23,42,0.08);
      --border-focus: rgba(124,58,237,0.45);
      --text: #0f172a;
      --muted: #475569;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --error-bg: rgba(254,226,226,0.95);
      --error-border: rgba(239,68,68,0.30);
      --error-text: #b91c1c;
      --success-bg: rgba(220,252,231,0.95);
      --success-border: rgba(34,197,94,0.28);
      --success-text: #047857;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: linear-gradient(180deg, #7f9bff 0%, #a98dff 45%, #ede7ff 100%);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 80% 90%, rgba(79,70,229,0.12) 0%, transparent 55%);
      pointer-events: none;
    }

    .card {
      width: 100%; max-width: 430px;
      padding: 44px 38px;
      background: var(--surface);
      border: 1px solid rgba(15,23,42,0.08);
      border-radius: 24px;
      box-shadow: 0 28px 64px rgba(15,23,42,0.10);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

    h1 { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 6px;
    }

    input {
      width: 100%; padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid rgba(15,23,42,0.12);
      border-radius: var(--radius);
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #7b8794; }
    input:focus { border-color: var(--border-focus); background: #ffffff; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
    input.has-error { border-color: var(--error-border); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 42px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0; line-height: 1;
    }
    .toggle-pw:hover { color: var(--text); }

    /* Password strength bar */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .alert {
      display: none; border-radius: var(--radius);
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; align-items: center; gap: 8px; line-height: 1.4;
    }
    .alert.visible { display: flex; }
    .alert.error   { background: var(--error-bg);   border: 0.5px solid var(--error-border);   color: var(--error-text); }
    .alert.success { background: var(--success-bg); border: 0.5px solid var(--success-border); color: var(--success-text); }

    .btn {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: 999px;
      cursor: pointer; transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s; margin-top: 4px;
      box-shadow: 0 18px 35px rgba(37,99,235,0.18);
    }
    .btn:hover:not(:disabled) { opacity: 0.98; box-shadow: 0 22px 40px rgba(37,99,235,0.22); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(16,42,67,0.15);
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner  { display: block; }

    .back-link {
      display: flex; align-items: center; gap: 6px;
      margin-top: 20px; font-size: 13px; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    /* Invalid token state */
    #invalid-token { display: none; text-align: center; }
    #invalid-token .icon {
      font-size: 32px; margin-bottom: 12px;
      color: var(--error-text);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>

  <!-- Invalid / missing token -->
  <div id="invalid-token">
    <div class="icon">✕</div>
    <h1 style="font-size:18px; margin-bottom:8px;">Link invalid or expired</h1>
    <p class="subtitle">This reset link has already been used or has expired. Links are valid for 1 hour.</p>
    <a href="forgot_password.html" class="btn" style="display:block; text-align:center; text-decoration:none; margin-top:8px;">Request a new link</a>
  </div>

  <!-- Reset form -->
  <div id="reset-form">
    <h1>Set new password</h1>
    <p class="subtitle">Choose a strong password for your account.</p>

    <div class="alert error" id="error-msg" role="alert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-text"></span>
    </div>

    <div class="alert success" id="success-msg" role="status">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="success-text"></span>
    </div>

    <div class="field">
      <label for="new-password">New password</label>
      <div class="pw-wrap">
        <input type="password" id="new-password" placeholder="••••••••" oninput="checkStrength(this.value)" />
        <button class="toggle-pw" type="button" onclick="togglePw('new-password')" aria-label="Show password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar">
        <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
      </div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="field">
      <label for="confirm-password">Confirm password</label>
      <div class="pw-wrap">
        <input type="password" id="confirm-password" placeholder="••••••••" />
        <button class="toggle-pw" type="button" onclick="togglePw('confirm-password')" aria-label="Show password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="submit-btn" onclick="handleSubmit()">
      <span class="btn-text">Update password</span>
      <div class="spinner"></div>
    </button>

    <a href="login.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to sign in
    </a>
  </div>
</div>

<script>
  /* ── Read token from URL: reset_password.html?token=abc123 ── */
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('reset-form').style.display    = 'none';
    document.getElementById('invalid-token').style.display = 'block';
  }

  /* ── Password strength checker ── */
  function checkStrength(val) {
    const bars   = [1,2,3,4].map(i => document.getElementById('s' + i));
    const label  = document.getElementById('strength-label');
    const colors = ['#ef4444','#f97316','#eab308','#34d399'];
    const labels = ['Weak','Fair','Good','Strong'];

    let score = 0;
    if (val.length >= 8)            score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val))  score++;

    bars.forEach((b, i) => {
      b.style.background = i < score ? colors[score - 1] : 'var(--border)';
    });
    label.textContent    = val.length ? labels[score - 1] || '' : '';
    label.style.color    = val.length ? colors[score - 1] : 'var(--muted)';
  }

  function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    document.getElementById('success-msg').classList.remove('visible');
    document.getElementById('error-text').textContent = msg;
    document.getElementById('error-msg').classList.add('visible');
  }

  function showSuccess(msg) {
    document.getElementById('error-msg').classList.remove('visible');
    document.getElementById('success-text').textContent = msg;
    document.getElementById('success-msg').classList.add('visible');
    document.getElementById('new-password').closest('.field').style.display    = 'none';
    document.getElementById('confirm-password').closest('.field').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'none';
  }

  function clearMessages() {
    ['error-msg','success-msg'].forEach(id => document.getElementById(id).classList.remove('visible'));
    ['new-password','confirm-password'].forEach(id => document.getElementById(id).classList.remove('has-error'));
  }

  function setLoading(on) {
    const btn = document.getElementById('submit-btn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function handleSubmit() {
    clearMessages();

    const newPw  = document.getElementById('new-password').value;
    const confPw = document.getElementById('confirm-password').value;

    if (!newPw || !confPw) {
      showError('Please fill in both fields.');
      return;
    }
    if (newPw.length < 8) {
      showError('Password must be at least 8 characters.');
      document.getElementById('new-password').classList.add('has-error');
      return;
    }
    if (newPw !== confPw) {
      showError('Passwords do not match.');
      document.getElementById('confirm-password').classList.add('has-error');
      return;
    }

    setLoading(true);

    try {
      const response = await fetch('/drug_4u/controllers/reset_password.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password: newPw })
      });

      const text = await response.text();
      let data;
      try { data = JSON.parse(text); }
      catch (e) {
        console.error('PHP returned non-JSON:', text);
        showError('Server error. Please contact your administrator.');
        setLoading(false);
        return;
      }

      if (data.success) {
        showSuccess('Password updated! Redirecting to login…');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } else {
        showError(data.message || 'Something went wrong. Please request a new link.');
      }

    } catch (error) {
      console.error('Fetch error:', error);
      showError('Cannot reach server. Please try again later.');
    }

    setLoading(false);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
